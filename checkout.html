<!-- Navigation -->
<nav class="navbar navbar-expand-md navbar-light bg-light sticky-top">
	<div class="container-fluid">
		<a class="navbar-brand" href="index.html"><img src="img/logo6.jpg"></a>
		<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="navbarResponsive">
			<ul class="navbar-nav ml-auto">
				<li class="nav-item">
					<a class="nav-link home-link" href="index.html">Home</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" id="cart" href="#">
						<i class="fas fa-shopping-cart"></i> Cart
					</a>
				</li>
				<li class="nav-item active">
					<a class="nav-link" id="checkout" href="checkout.html">
						<i class="fas fa-credit-card"></i> Checkout
					</a>
				</li>
			</ul>
		</div>
	</div>
</nav>

<div class="container padding" style="margin-top: 50px; margin-bottom: 50px;" data-aos="fade-up">
	<div class="row welcome text-center">
		<div class="col-12">
			<h1 class="display-4">Checkout</h1>
			<hr>
		</div>
	</div>
	<div class="row padding">
		<div class="col-md-8 offset-md-2">
			<form id="checkout-form">
				<div class="form-row">
					<div class="form-group col-md-6">
						<label for="firstName">First Name</label>
						<input type="text" class="form-control" id="firstName" placeholder="John" required>
					</div>
					<div class="form-group col-md-6">
						<label for="lastName">Last Name</label>
						<input type="text" class="form-control" id="lastName" placeholder="Doe" required>
					</div>
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" class="form-control" id="email" placeholder="john.doe@example.com" required>
				</div>
				<div class="form-group">
					<label for="address">Address</label>
					<input type="text" class="form-control" id="address" placeholder="1234 Main St" required>
				</div>
				<hr class="mb-4">
				<h4 class="mb-3">Payment</h4>
				<div class="d-block my-3">
					<div class="custom-control custom-radio">
						<input id="credit" name="paymentMethod" type="radio" class="custom-control-input" checked required>
						<label class="custom-control-label" for="credit">Credit card</label>
					</div>
				</div>
				<div class="row">
					<div class="col-md-6 mb-3">
						<label for="cc-name">Name on card</label>
						<input type="text" class="form-control" id="cc-name" placeholder="" required>
					</div>
					<div class="col-md-6 mb-3">
						<label for="cc-number">Credit card number</label>
						<input type="text" class="form-control" id="cc-number" placeholder="" required>
					</div>
				</div>
				<hr class="mb-4">
				<button class="btn btn-primary btn-lg btn-block" type="submit">Complete Purchase</button>
			</form>
		</div>
	</div>
</div>

<!--- Footer -->
<footer>
	<div class="container-fluid padding">
		<div class="row text-center">
			<div class="col-12">
				<hr class="light-100">
				<h5>&copy; Website Learning </h5>
			</div>
		</div>
	</div>
</footer>

<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script>
AOS.init();

// Carry forward query parameters to Home/Logo/Checkout links
document.addEventListener('DOMContentLoaded', function() {
    var currentSearch = window.location.search;
    if (currentSearch) {
        document.querySelectorAll('a').forEach(function(link) {
            var href = link.getAttribute('href');
            if (href && (href.startsWith('index.html') || href.startsWith('checkout.html') || href === '#')) {
                // Skip hash-only links from appending .html
                if (href === '#') return;
                
                if (href.indexOf('?') === -1) {
                    link.href = href + currentSearch;
                }
            }
        });
        // Special case for logo
        var brand = document.querySelector('.navbar-brand');
        if (brand) brand.href = 'index.html' + currentSearch;
        
        var homeLink = document.querySelector('.home-link');
        if (homeLink) homeLink.href = 'index.html' + currentSearch;
    }
});
</script>

</body>
</html>
